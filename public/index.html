<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: #6c63ff;
            top: -100px;
            left: -100px
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: #f857a6;
            bottom: -80px;
            right: -80px
        }

        .orb3 {
            width: 200px;
            height: 200px;
            background: #00d2ff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%)
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 40px;
            width: 90%;
            max-width: 520px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5)
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6c63ff, #f857a6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px
        }

        .logo-text span {
            color: #6c63ff
        }

        h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px
        }

        p {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6
        }

        .input-wrap {
            position: relative;
            margin-bottom: 14px
        }

        .input-wrap .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 42px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s
        }

        input::placeholder {
            color: #555
        }

        input:focus {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15)
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4)
        }

        button:active {
            transform: translateY(0)
        }

        .quick {
            margin-top: 24px
        }

        .quick-label {
            color: #555;
            font-size: 12px;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center
        }

        .chip {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s
        }

        .chip:hover {
            background: rgba(108, 99, 255, 0.2);
            border-color: #6c63ff;
            color: #fff
        }

        .status {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #6c63ff;
            display: none
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(108, 99, 255, 0.3);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔓</div>
            <div class="logo-text">Free<span>Gate</span></div>
        </div>
        <h1>Access Anything</h1>
        <p>Bypass network restrictions and open any website securely through this private gateway.</p>
        <div class="input-wrap">
            <span class="icon">🌐</span>
            <input id="url" type="text" placeholder="https://instagram.com" autocomplete="off" spellcheck="false" />
        </div>
        <button onclick="go()">Open Website →</button>
        <div class="status" id="status"><span class="loader"></span>Connecting through gateway...</div>
        <div class="quick">
            <div class="quick-label">Quick Access</div>
            <div class="chips">
                <div class="chip" onclick="open2('https://instagram.com')">Instagram</div>
                <div class="chip" onclick="open2('https://youtube.com')">YouTube</div>
                <div class="chip" onclick="open2('https://twitter.com')">Twitter</div>
                <div class="chip" onclick="open2('https://reddit.com')">Reddit</div>
                <div class="chip" onclick="open2('https://google.com')">Google</div>
            </div>
        </div>
    </div>
    <script>
        function go() {
            let u = document.getElementById('url').value.trim();
            if (!u) return;
            if (!u.startsWith('http')) u = 'https://' + u;
            document.getElementById('status').style.display = 'block';
            setTimeout(() => { window.location.href = '/api?url=' + encodeURIComponent(u); }, 300);
        }
        function open2(u) {
            document.getElementById('url').value = u;
            go();
        }
        document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    </script>
</body>

</html>
